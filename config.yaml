# VoiceScribe — конфигурация
# Все параметры доступны через окно настроек (tray → Настройки...)
# Файл редактируется вручную или через UI; изменения применяются без перезапуска.

app:
  first_run: false         # false после первого запуска (onboarding пропускается)
  language: auto           # auto | ru | en

# ── Горячая клавиша и режим записи ───────────────────────────────────────────
hotkey:
  key: ctrl+shift+space    # Комбинация клавиш
  mode: toggle             # hold | toggle
  min_hold_ms: 500         # Hold: минимальное время нажатия (мс); короче — игнорируется
  autostop_sec: 30         # Toggle: автостоп при тишине (сек)
  max_record_sec: 300      # Максимальная длина записи (5 минут)

# ── Аудио ────────────────────────────────────────────────────────────────────
audio:
  device: default          # default = системный микрофон; или индекс устройства
  sample_rate: 16000       # НЕ МЕНЯТЬ — Whisper требует 16 кГц
  channels: 1              # НЕ МЕНЯТЬ — только моно
  chunk_ms: 32             # 32 мс = 512 сэмплов @ 16kHz — точно совпадает с окном Silero VAD v4

# ── VAD ──────────────────────────────────────────────────────────────────────
vad:
  threshold: 0.5           # Порог VAD (0.0–1.0); выше = меньше ложных срабатываний
  min_speech_ms: 250       # Минимальная длина речи (мс), короче — не считается речью
  min_silence_ms: 700      # Пауза тишины (мс) для завершения сегмента речи
  pre_speech_pad_ms: 300   # Захват аудио до начала речи (мс)

# ── Транскрипция (Faster-Whisper) ────────────────────────────────────────────
transcriber:
  model: large-v3-turbo    # Модель Whisper: tiny | base | small | medium | large-v3-turbo
  device: cuda             # cuda | cpu
  compute_type: int8       # int8 (быстро, ~1.5 ГБ VRAM) | float16 (надёжнее, ~3 ГБ VRAM)
  beam_size: 5             # Ширина beam search; 5 — хороший баланс точности/скорости
  language:                # null = автоопределение; или "ru" / "en"
  task: transcribe         # transcribe | translate (translate → всегда English)
  condition_on_previous: false  # Контекст между сегментами; false для коротких записей

# ── LLM постобработка (Phi-3.5 Mini) ─────────────────────────────────────────
editor:
  enabled: false           # false = только сырая транскрипция без LLM (llama-cpp-python недоступен на Python 3.13)
  model_path: models/Phi-3.5-mini-Q4.gguf
  gpu_layers: -1           # -1 = все слои на GPU; 0 = CPU; N = N слоёв на GPU
  context_size: 2048       # Контекстное окно (токены)
  max_tokens: 1024         # Максимальная длина ответа (токены)
  temperature: 0.1         # Низкая температура = детерминированный вывод
  timeout_sec: 10          # Таймаут LLM (сек); при превышении — вернуть сырую транскрипцию

# ── Вывод ────────────────────────────────────────────────────────────────────
output:
  mode: clipboard          # clipboard (единственный режим в MVP)
  notify: true             # Показывать Windows Toast при готовности текста
  notify_duration_ms: 3000 # Длительность Toast-уведомления (мс)
  notify_preview_chars: 60 # Количество символов текста в превью уведомления
  history_size: 0          # 0 = история отключена (конфиденциальность)
